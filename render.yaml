# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → New Blueprint → select render.yaml
#
# Before deploy: create a MySQL database (PlanetScale, Aiven, Railway, etc.)
# and set DB_* env vars on the API service in the Render dashboard.

services:
  - type: web
    name: haf-api
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./server/trade-backend/Dockerfile
    dockerContext: ./server/trade-backend
    healthCheckPath: /health
    disk:
      name: haf-uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: haf-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: haf-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: haf-web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: haf-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_SSR_URL
        fromService:
          type: web
          name: haf-api
          envVarKey: RENDER_EXTERNAL_URL
